<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilson AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === GLOBAL VARIABLES === */
        :root {
            --bg-gradient-start: #0a0a0f;
            --bg-gradient-mid: #1a1a2e;
            --bg-gradient-end: #16213e;
            --glass-bg: rgba(25, 25, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --accent-primary: #7c5cff;
            --accent-hover: #6a4ae0;
            --accent-glow: rgba(124, 92, 255, 0.4);
            --accent-red: #ff4757;
            --text-primary: #f5f5f7;
            --text-secondary: #b8b8d0;
            --text-muted: #787890;
            --user-msg-bg: rgba(124, 92, 255, 0.15);
            --bot-msg-bg: rgba(35, 35, 50, 0.8);
            --success: #34c759;
            --warning: #ff9f0a;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px var(--accent-glow);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* === LIQUID GLASS BACKGROUND === */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }            100% { background-position: 0% 50%; }
        }

        /* Floating particles effect */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(124, 92, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 71, 87, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(100, 100, 150, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* === LIQUID GLASS CARD EFFECT === */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top-color: var(--glass-highlight);
            border-left-color: var(--glass-highlight);
            box-shadow: var(--shadow-soft), var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .glass::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                var(--glass-highlight) 50%,
                transparent 70%
            );
            transform: rotate(45deg);
            animation: liquidShine 8s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes liquidShine {
            0%, 100% { transform: rotate(45deg) translateX(-100%); }
            50% { transform: rotate(45deg) translateX(100%); }
        }
        /* === SIDEBAR === */
        .sidebar {
            width: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 8px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 20;
        }

        .sidebar-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: rgba(255,255,255,0.03);
        }

        .sidebar-icon:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            transform: scale(1.05);
        }

        .sidebar-icon.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .sidebar-icon.active::before {
            content: '';
            position: absolute;
            left: -10px;
            width: 3px;
            height: 20px;
            background: white;
            border-radius: 0 2px 2px 0;
        }

        .sidebar-divider {            width: 32px;
            height: 1px;
            background: var(--glass-border);
            margin: 4px 0;
        }

        .sidebar-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: auto;
            background: linear-gradient(135deg, var(--accent-red), #ff7675);
            overflow: hidden;
        }

        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-avatar .avatar-fallback {
            font-weight: 600;
            color: white;
            font-size: 1.1rem;
        }

        /* === HISTORY PANEL === */
        .history-panel {
            position: fixed;
            left: 72px;
            top: 0;
            width: 300px;
            height: 100vh;
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .history-panel.open {
            transform: translateX(0);
        }

        .history-header {            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-header h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .history-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.4rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .history-close:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }

        .history-item {
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.2s;            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--glass-border);
        }

        .history-item.active {
            background: linear-gradient(135deg, rgba(124,92,255,0.2), rgba(124,92,255,0.1));
            border-color: var(--accent-primary);
        }

        .history-item-title {
            font-weight: 500;
            font-size: 0.92rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .history-actions {
            padding: 14px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        .history-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .history-btn:hover {            background: rgba(255,255,255,0.08);
            border-color: var(--accent-primary);
        }

        .history-btn.danger {
            color: var(--accent-red);
            border-color: rgba(255, 71, 87, 0.3);
        }

        .history-btn.danger:hover {
            background: rgba(255, 71, 87, 0.1);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 40;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* === MAIN CHAT WRAPPER === */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            position: relative;
            z-index: 10;
        }

        /* === HEADER === */
        .chat-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: linear-gradient(135deg, var(--accent-red), #ff7675);
        }

        .bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bot-avatar .avatar-fallback {
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
        }

        .header-info h1 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-info span {
            font-size: 0.82rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-info span::before {
            content: '';
            width: 7px;
            height: 7px;
            background: var(--success);            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* === MESSAGES AREA === */
        .chat-messages {
            flex: 1;
            padding: 20px 28px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--glass-border);            border-radius: 3px;
        }

        .message-group {
            display: flex;
            gap: 14px;
            padding: 6px 0;
            animation: messageSlide 0.25s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-group.bot { flex-direction: row; }
        .message-group.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--accent-red), #ff7675);
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar .avatar-fallback {
            font-weight: 600;
            color: white;
            font-size: 0.95rem;
        }

        .message-group.user .message-avatar {
            background: linear-gradient(135deg, var(--accent-primary), #6a4ae0);
        }

        .message-content {
            max-width: 78%;
            display: flex;
            flex-direction: column;            gap: 5px;
        }

        .message-group.user .message-content { align-items: flex-end; }

        .message-header {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .message-group.user .message-header { flex-direction: row-reverse; }

        .username {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.88rem;
        }

        .message-group.bot .username { color: #ff7a8a; }
        .message-group.user .username { color: var(--accent-primary); }

        .timestamp {
            font-size: 0.73rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .message-bubble {
            padding: 13px 17px;
            border-radius: 16px;
            font-size: 0.96rem;
            line-height: 1.55;
            position: relative;
        }

        .message-group.bot .message-bubble {
            background: var(--bot-msg-bg);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 6px;
        }

        .message-group.user .message-bubble {
            background: var(--user-msg-bg);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-top-right-radius: 6px;
        }
        /* Message actions on hover */
        .message-actions {
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 2px 0 0;
        }

        .message-group:hover .message-actions { opacity: 1; }
        .message-group.user .message-actions { justify-content: flex-end; }

        .action-btn {
            padding: 5px 9px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .action-btn.liked { color: var(--accent-red); }
        .reaction-count { font-size: 0.73rem; }

        /* === TYPING INDICATOR with SPINNER === */
        .typing-indicator {
            display: none;
            padding: 4px 0 8px;
        }

        .typing-indicator.active { display: flex; align-items: flex-start; gap: 14px; }

        .typing-indicator .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-red), #ff7675);
            display: flex;
            align-items: center;
            justify-content: center;            flex-shrink: 0;
        }

        .typing-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 78%;
        }

        .typing-bubble {
            padding: 12px 16px;
            background: var(--bot-msg-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            border-top-left-radius: 6px;
            display: flex;
            gap: 5px;
            align-items: center;
            min-width: 80px;
        }

        .typing-bubble span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-bubble span:nth-child(1) { animation-delay: -0.32s; }
        .typing-bubble span:nth-child(2) { animation-delay: -0.16s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Google-style spinner under typing text */
        .typing-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-left: 4px;
            flex-shrink: 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* === INPUT AREA === */
        .input-area {
            padding: 16px 24px 22px;
            position: relative;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-radius: 18px;
            padding: 10px 14px;
            transition: all 0.25s;
            border: 1px solid var(--glass-border);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 6px 2px;
            resize: none;
            outline: none;
            max-height: 140px;
            line-height: 1.5;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);            opacity: 0.9;
        }

        .input-actions {
            display: flex;
            gap: 4px;
            padding: 3px 0;
            align-items: center;
        }

        .input-btn {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .input-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .input-btn.send {
            background: var(--accent-primary);
            color: white;
        }

        .input-btn.send:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .input-btn.send:disabled {
            background: var(--glass-border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            text-align: center;
            font-size: 0.73rem;
            color: var(--text-muted);            margin-top: 10px;
            opacity: 0.85;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            padding: 10px;
            opacity: 0.7;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .history-panel { left: 0; width: 100%; max-width: 340px; }
            .message-content { max-width: 92%; }
            .chat-header { padding: 14px 18px; }
            .chat-messages { padding: 16px 20px 20px; }
            .input-area { padding: 14px 18px 20px; }
            .header-info h1 { font-size: 1.05rem; }
        }

        @media (max-width: 480px) {
            .header-actions { gap: 4px; }
            .header-btn { width: 34px; height: 34px; border-radius: 9px; }
            .input-wrapper { padding: 8px 12px; }
            .input-btn { width: 34px; height: 34px; border-radius: 9px; }
        }

        /* === UTILITIES === */
        .hidden { display: none !important; }
        .fade-in { animation: messageSlide 0.3s ease; }
        
        /* Logo placeholder styling */
        .logo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-red), #ff7675);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar glass">
        <div class="sidebar-icon active" id="btnChat" title="Чат" onclick="toggleHistory(false)">
            <i class="fas fa-comments"></i>
        </div>
        <div class="sidebar-icon" id="btnHistory" title="История" onclick="toggleHistory(true)">
            <i class="fas fa-clock"></i>
        </div>
        <div class="sidebar-icon" title="Настройки">
            <i class="fas fa-cog"></i>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon" title="Справка">
            <i class="fas fa-question"></i>
        </div>
        <div class="sidebar-avatar" title="Профиль">
            <img src="wilson.png" alt="Wilson" onerror="this.parentElement.innerHTML='<div class=\\'avatar-fallback\\'>W</div>'">
        </div>
    </aside>

    <!-- HISTORY PANEL -->
    <div class="history-panel glass" id="historyPanel">
        <div class="history-header">
            <h3>📚 История</h3>
            <button class="history-close" onclick="toggleHistory(false)">×</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="history-actions">
            <button class="history-btn" onclick="createNewSession()">+ Новый</button>
            <button class="history-btn danger" onclick="clearAllHistory()">Очистить</button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleHistory(false)"></div>

    <!-- MAIN CHAT -->
    <main class="chat-wrapper">
        
        <!-- HEADER -->
        <header class="chat-header glass">
            <div class="header-left">
                <div class="bot-avatar">
                    <img src="wilson.png" alt="Wilson" onerror="this.parentElement.innerHTML='<div class=\\'logo-placeholder\\'>W</div>'">
                </div>
                <div class="header-info">
                    <h1>Wilson AI</h1>
                    <span id="connectionStatus">Онлайн</span>
                </div>            </div>
            <div class="header-actions">
                <button class="header-btn" title="История" onclick="toggleHistory(true)">
                    <i class="fas fa-history"></i>
                </button>
                <button class="header-btn" title="Новый чат" onclick="createNewSession()">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="header-btn" title="Экспорт" onclick="exportChat()">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </header>

        <!-- MESSAGES -->
        <div class="chat-messages" id="chatBox"></div>

        <!-- TYPING INDICATOR with SPINNER -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar">
                <img src="wilson.png" alt="W" onerror="this.parentElement.innerHTML='<div class=\\'avatar-fallback\\'>W</div>'">
            </div>
            <div class="typing-content">
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
                <div class="typing-text">
                    Wilson печатает
                    <div class="typing-spinner"></div>
                </div>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <div class="input-wrapper glass">
                <textarea 
                    id="userInput" 
                    placeholder="Спросите о вулканах, кальдерах или чём-то ещё..." 
                    rows="1"
                    oninput="handleInput()"
                ></textarea>
                <div class="input-actions">
                    <button class="input-btn" title="Прикрепить" onclick="showTemporaryFeedback('Функция в разработке', '#faa61a')">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button class="input-btn send" id="sendBtn" onclick="sendMessage()" disabled>
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>            </div>
            <div class="input-hint">
                <i class="fas fa-keyboard"></i> 
                <strong>Enter</strong> — отправить • <strong>Shift+Enter</strong> — новая строка
            </div>
        </div>

        <footer class="footer">
            Wilson Corporation © 2026 • v2.3.0
        </footer>

    </main>

    <script>
        /* === GLOBAL STATE === */
        let currentSessionId = null;
        let sessions = {};
        let messageId = 0;
        let isInitialized = false;

        /* === DOM ELEMENTS (cached after DOM load) === */
        let chatBox, userInput, sendBtn, typingIndicator, historyList, historyPanel, overlay;

        /* === KNOWLEDGE BASE === */
        const knowledgeBase = {
            "yellowstone": {
                keywords: ["йеллоустон", "yellowstone", "йеллоустоун", "йеллоустонский"],
                answer: "Йеллоустон — национальный парк в США, расположенный над одной из крупнейших вулканических систем мира. Это активный супервулкан с геотермальной зоной: более 500 гейзеров, горячие источники, грязевые котлы и фумаролы."
            },
            "long_valley": {
                keywords: ["лонг велли", "long valley", "лонг-велли", "лонгвелли"],
                answer: "Лонг-Велли — крупная кальдера в восточной Калифорнии, образованная ~760 000 лет назад мощным извержением, выбросившим более 600 км³ материала. Сейчас это зона геотермальной активности."
            },
            "valles": {
                keywords: ["валлес", "valles", "кальдера валлес"],
                answer: "Кальдера Валлес в Нью-Мексико — одна из крупнейших на Земле. Образовалась двумя извержениями: 1.61 и 1.23 млн лет назад. Диаметр ~22 км, активна геотермально."
            },
            "caldera": {
                keywords: ["кальдера", "caldera", "вулканическая впадина", "кальдеры"],
                answer: "Кальдера — вулканическая впадина, образовавшаяся после обрушения магматической камеры при мощном извержении. Диаметры достигают 50+ км. Примеры: Йеллоустон, Тоба, Айра."
            },
            "geysers": {
                keywords: ["гейзер", "гейзеры", "старый служака", "old faithful", "пароход", "steamboat", "великий фонтан"],
                answer: "В Йеллоустоне 500+ гейзеров. Старый Служака извергается каждые 60-110 мин. Пароход — самый высокий в мире (до 120 м). Также: Великий Фонтан, Гигант, Лайон."
            },
            "yellowstone_location": {
                keywords: ["где йеллоустон", "йеллоустон где", "location yellowstone", "штат йеллоустон", "вайоминг йеллоустон"],
                answer: "Йеллоустонский нацпарк: 96% в Вайоминге, 3% в Монтане, 1% в Айдахо. Основан в 1872 году — первый национальный парк в мире."
            },
            "yellowstone_eruption": {                keywords: ["извержение йеллоустон", "если йеллоустон взорвётся", "последствия йеллоустон", "supereruption", "супервулкан"],
                answer: "Полномасштабное извержение Йеллоустона покроет пеплом большую часть США, нарушит климат на годы. Но вероятность в ближайшие тысячелетия крайне мала. Мониторинг ведётся постоянно."
            }
        };

        const defaultResponse = "Я пока не обучен отвечать на этот вопрос. Попробуйте спросить о вулканах, кальдерах или гейзерах. Например: «Что такое кальдера?» или «Где находится Йеллоустон?»";

        /* === SMART RESPONSE === */
        function findResponse(text) {
            const lower = text.toLowerCase().trim();
            
            // 1. Direct keyword match
            for (let key in knowledgeBase) {
                const entry = knowledgeBase[key];
                if (entry.keywords) {
                    for (let kw of entry.keywords) {
                        if (lower.includes(kw)) return entry.answer;
                    }
                }
            }
            
            // 2. Pattern: "что такое X" → find X in keywords
            if (/что такое|расскажи про|объясни|что значит|что это/i.test(lower)) {
                for (let key in knowledgeBase) {
                    const entry = knowledgeBase[key];
                    if (entry.keywords) {
                        for (let kw of entry.keywords) {
                            if (lower.includes(kw)) return entry.answer;
                        }
                    }
                }
            }
            
            return defaultResponse;
        }

        /* === SESSION MANAGEMENT === */
        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
        }

        function loadSessions() {
            try {
                const saved = localStorage.getItem('wilson_sessions');
                if (saved) sessions = JSON.parse(saved);
            } catch(e) { console.warn('Session load error:', e); sessions = {}; }
        }

        function saveSessions() {
            try {                localStorage.setItem('wilson_sessions', JSON.stringify(sessions));
            } catch(e) { console.warn('Session save error:', e); }
        }

        function createNewSession(title = null) {
            if (currentSessionId && sessions[currentSessionId]) {
                saveCurrentSession();
            }
            
            const newId = generateSessionId();
            sessions[newId] = {
                id: newId,
                title: title || 'Новый чат',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                messages: []
            };
            
            currentSessionId = newId;
            saveSessions();
            renderHistoryList();
            clearChatUI();
            
            setTimeout(() => {
                addMessage("Система Wilson активирована. О чём вы хотите узнать?", 'bot', false);
            }, 400);
            
            return newId;
        }

        function saveCurrentSession() {
            if (!currentSessionId || !sessions[currentSessionId]) return;
            
            const session = sessions[currentSessionId];
            session.updatedAt = new Date().toISOString();
            
            if (session.title === 'Новый чат' && session.messages.length === 0) {
                const firstUser = Array.from(chatBox.querySelectorAll('.message-group.user'))[0];
                if (firstUser) {
                    const text = firstUser.querySelector('.message-bubble')?.textContent || '';
                    session.title = text.slice(0, 35) + (text.length > 35 ? '...' : '') || 'Новый чат';
                }
            }
            
            session.messages = Array.from(chatBox.querySelectorAll('.message-group')).map(group => ({
                sender: group.classList.contains('user') ? 'user' : 'bot',
                text: group.querySelector('.message-bubble')?.dataset.text || '',
                timestamp: group.querySelector('.timestamp')?.textContent || ''
            }));
                        saveSessions();
        }

        function loadSession(sessionId) {
            if (currentSessionId) saveCurrentSession();
            
            currentSessionId = sessionId;
            const session = sessions[sessionId];
            if (!session) return;
            
            clearChatUI();
            
            for (let msg of session.messages) {
                const group = createMessageGroup(msg.text, msg.sender, false);
                const bubble = group.querySelector('.message-bubble');
                bubble.textContent = msg.text;
                bubble.dataset.text = msg.text;
                if (msg.timestamp) group.querySelector('.timestamp').textContent = msg.timestamp;
                chatBox.appendChild(group);
            }
            
            renderHistoryList();
            scrollToBottom();
        }

        function deleteSession(sessionId, e) {
            e?.stopPropagation?.();
            if (!confirm('Удалить эту сессию?')) return;
            
            delete sessions[sessionId];
            saveSessions();
            
            if (sessionId === currentSessionId) {
                const ids = Object.keys(sessions);
                if (ids.length > 0) loadSession(ids[0]);
                else createNewSession();
            } else {
                renderHistoryList();
            }
        }

        function clearAllHistory() {
            if (!confirm('⚠️ Удалить ВСЮ историю? Это нельзя отменить.')) return;
            sessions = {};
            currentSessionId = null;
            localStorage.removeItem('wilson_sessions');
            createNewSession();
        }

        function renderHistoryList() {            if (!historyList) return;
            historyList.innerHTML = '';
            
            const sorted = Object.values(sessions).sort((a,b) => 
                new Date(b.updatedAt) - new Date(a.updatedAt)
            );
            
            if (sorted.length === 0) {
                historyList.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;font-size:0.9rem">Нет сохранённых чатов</div>';
                return;
            }
            
            for (let session of sorted) {
                const item = document.createElement('div');
                item.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
                item.onclick = () => loadSession(session.id);
                
                const date = new Date(session.updatedAt);
                const dateStr = date.toLocaleDateString('ru-RU', { 
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
                });
                
                const userMsgs = session.messages?.filter(m => m.sender === 'user').length || 0;
                
                item.innerHTML = `
                    <div class="history-item-title">${escapeHtml(session.title)}</div>
                    <div class="history-item-meta">
                        <span>${dateStr}</span>
                        <span>${userMsgs} сообщ.</span>
                    </div>
                `;
                
                if (window.innerWidth > 768) {
                    item.style.position = 'relative';
                    const btn = document.createElement('button');
                    btn.innerHTML = '×';
                    btn.style.cssText = `
                        position:absolute;right:10px;top:50%;transform:translateY(-50%);
                        background:none;border:none;color:var(--text-muted);
                        cursor:pointer;font-size:1.1rem;opacity:0;transition:0.2s;
                        width:24px;height:24px;border-radius:6px;
                        display:flex;align-items:center;justify-content:center;
                    `;
                    btn.onclick = (e) => deleteSession(session.id, e);
                    item.onmouseenter = () => btn.style.opacity = '1';
                    item.onmouseleave = () => btn.style.opacity = '0';
                    item.appendChild(btn);
                }
                
                historyList.appendChild(item);            }
        }

        function toggleHistory(show) {
            if (!historyPanel || !overlay) return;
            
            if (show) {
                historyPanel.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('btnHistory')?.classList.add('active');
                document.getElementById('btnChat')?.classList.remove('active');
                renderHistoryList();
            } else {
                historyPanel.classList.remove('open');
                overlay.classList.remove('active');
                document.getElementById('btnHistory')?.classList.remove('active');
                document.getElementById('btnChat')?.classList.add('active');
            }
        }

        function exportChat() {
            if (!currentSessionId || !sessions[currentSessionId]) {
                showTemporaryFeedback('Нет чата для экспорта', '#faa61a');
                return;
            }
            
            saveCurrentSession();
            const session = sessions[currentSessionId];
            const content = (session.messages || []).map(m => 
                `[${m.timestamp}] ${m.sender === 'user' ? 'Вы' : 'Wilson'}: ${m.text}`
            ).join('\n\n');
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wilson-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            showTemporaryFeedback('Чат экспортирован!', '#34c759');
        }

        /* === MESSAGE FUNCTIONS === */
        function formatTime(date) {
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');            div.textContent = text;
            return div.innerHTML;
        }

        function createMessageGroup(text, sender, shouldType = true) {
            const group = document.createElement('div');
            group.className = `message-group ${sender} fade-in`;
            group.dataset.id = ++messageId;
            
            const isBot = sender === 'bot';
            const avatarContent = isBot 
                ? `<img src="wilson.png" alt="W" onerror="this.parentElement.innerHTML='<div class=\\'avatar-fallback\\'>W</div>'">`
                : `<div class="avatar-fallback">Вы</div>`;
            
            group.innerHTML = `
                <div class="message-avatar">${avatarContent}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="username">${isBot ? 'Wilson AI' : 'Вы'}</span>
                        <span class="timestamp">${formatTime(new Date())}</span>
                    </div>
                    <div class="message-bubble"></div>
                    <div class="message-actions">
                        <button class="action-btn" onclick="copyMessage(${messageId})" title="Копировать">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="action-btn" onclick="toggleLike(this)" title="Реакция">
                            <i class="far fa-heart"></i>
                            <span class="reaction-count">0</span>
                        </button>
                    </div>
                </div>
            `;
            
            return group;
        }

        function addMessage(text, sender, shouldType = true) {
            const group = createMessageGroup(text, sender, shouldType);
            const bubble = group.querySelector('.message-bubble');
            
            chatBox.appendChild(group);
            
            if (sender === 'bot' && shouldType) {
                typeWriter(text, bubble);
            } else {
                bubble.textContent = text;
                bubble.dataset.text = text;
            }
                        scrollToBottom();
            
            if (currentSessionId) {
                setTimeout(saveCurrentSession, 800);
            }
        }

        function typeWriter(text, element) {
            let i = 0;
            const speed = 18;
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    scrollToBottom();
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function scrollToBottom() {
            if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChatUI() {
            if (chatBox) chatBox.innerHTML = '';
            messageId = 0;
        }

        function copyMessage(id) {
            const bubble = document.querySelector(`[data-id="${id}"] .message-bubble`);
            if (bubble?.dataset.text) {
                navigator.clipboard.writeText(bubble.dataset.text);
                showTemporaryFeedback('Скопировано!', '#34c759');
            }
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
            const icon = btn.querySelector('i');
            const count = btn.querySelector('.reaction-count');
            let num = parseInt(count.textContent) || 0;
            
            if (btn.classList.contains('liked')) {
                icon.className = 'fas fa-heart';
                count.textContent = num + 1;
                showTemporaryFeedback('❤️ Реакция', '#ff4757');
            } else {                icon.className = 'far fa-heart';
                count.textContent = Math.max(0, num - 1);
            }
        }

        function showTemporaryFeedback(text, color) {
            const fb = document.createElement('div');
            fb.textContent = text;
            fb.style.cssText = `
                position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
                background:${color};color:white;padding:10px 18px;
                border-radius:12px;font-size:0.85rem;z-index:200;
                box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:fadeIn 0.2s ease;
            `;
            document.body.appendChild(fb);
            setTimeout(() => {
                fb.style.opacity = '0';
                fb.style.transition = 'opacity 0.2s';
                setTimeout(() => fb.remove(), 200);
            }, 1800);
        }

        /* === INPUT HANDLING === */
        function handleInput() {
            if (!userInput || !sendBtn) return;
            
            // Auto-resize
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
            
            // Enable/disable send
            sendBtn.disabled = userInput.value.trim() === '';
        }

        function sendMessage() {
            if (!userInput) return;
            const text = userInput.value.trim();
            if (text === "" || !sendBtn || sendBtn.disabled) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            userInput.focus();

            if (typingIndicator) {
                typingIndicator.classList.add('active');
                scrollToBottom();
            }
            const delay = Math.floor(Math.random() * 700) + 500;

            setTimeout(() => {
                if (typingIndicator) typingIndicator.classList.remove('active');
                
                const response = findResponse(text);
                addMessage(response, 'bot');

            }, delay);
        }

        /* === INITIALIZATION === */
        function initApp() {
            // Cache DOM elements
            chatBox = document.getElementById('chatBox');
            userInput = document.getElementById('userInput');
            sendBtn = document.getElementById('sendBtn');
            typingIndicator = document.getElementById('typingIndicator');
            historyList = document.getElementById('historyList');
            historyPanel = document.getElementById('historyPanel');
            overlay = document.getElementById('overlay');
            
            if (!chatBox || !userInput || !sendBtn) {
                console.error('Critical DOM elements not found');
                return;
            }
            
            // Event listeners
            userInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Load sessions and start
            loadSessions();
            
            if (Object.keys(sessions).length === 0) {
                createNewSession();
            } else {
                const recent = Object.values(sessions).sort((a,b) => 
                    new Date(b.updatedAt) - new Date(a.updatedAt)
                )[0];
                loadSession(recent.id);
            }
            
            // Auto-save on unload
            window.addEventListener('beforeunload', () => {
                if (currentSessionId) saveCurrentSession();            });
            
            isInitialized = true;
            console.log('✓ Wilson AI initialized');
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
