<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faber v1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #000000 0%, #0a0e27 30%, #1a3a8f 60%, #6bb6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;            letter-spacing: 0.5px;
        }

        .header-version {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 400;
            margin-left: 4px;
        }

        /* Main Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 140px;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
        }

        /* Messages Container */
        .messages-container {
            width: 100%;
            max-width: 600px;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .messages-container.active {
            display: block;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-ai {
            display: flex;
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }

        .message-user .message-bubble {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }

        .message-ai .message-bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #000000;
            border-bottom-left-radius: 6px;
        }

        /* Bottom Input Bar */
        .input-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 600px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .menu-button {            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .menu-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .menu-button svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            padding: 12px 16px;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;        }

        .send-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .send-button svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }

        .send-button.active {
            background: #ffffff;
        }

        .send-button.active svg {
            fill: #000000;
            transform: rotate(-90deg);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.98);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 100px 20px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 10px;        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Loading Animation */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
        }

        .typing-dot {
            width: 8px;            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            z-index: 50;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .splash-screen img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 10px 20px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .input-bar {
                bottom: 20px;
                width: calc(100% - 30px);
            }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <img src="faber.png" alt="Faber">
    </div>

    <!-- Header -->
    <div class="header">
        <img src="faber.png" alt="Faber" class="header-logo">
        <span class="header-title">Faber</span>
        <span class="header-version">v1.0</span>
    </div>

    <!-- Main Content -->
    <div class="content" id="emptyState">
        <div class="empty-state">
            <p>Спросите Faber о чём угодно...</p>
        </div>
    </div>

    <!-- Messages Container -->
    <div class="messages-container" id="messagesContainer"></div>

    <!-- Sidebar -->
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">История</div>
        <ul class="history-list" id="historyList"></ul>
    </div>
    <!-- Input Bar -->
    <div class="input-bar">
        <button class="menu-button" id="menuButton">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <input type="text" class="input-field" id="inputField" placeholder="Спросить Faber...">
        <button class="send-button" id="sendButton">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
    </div>

    <!-- Footer -->
    <div class="footer">
        Wilson Corporation 2026© | Faber может ошибаться!
    </div>

    <script>
        // Elements
        const splashScreen = document.getElementById('splashScreen');
        const menuButton = document.getElementById('menuButton');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const inputField = document.getElementById('inputField');
        const sendButton = document.getElementById('sendButton');
        const emptyState = document.getElementById('emptyState');
        const messagesContainer = document.getElementById('messagesContainer');
        const historyList = document.getElementById('historyList');

        // Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                }, 800);
            }, 3000);
            loadHistory();
        });

        // Sidebar Toggle
        menuButton.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });
        // Input Handling
        inputField.addEventListener('input', () => {
            if (inputField.value.trim().length > 0) {
                sendButton.classList.add('active');
            } else {
                sendButton.classList.remove('active');
            }
        });

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // Hide empty state
            emptyState.style.display = 'none';
            messagesContainer.classList.add('active');

            // Add user message
            addMessage(text, 'user');
            inputField.value = '';
            sendButton.classList.remove('active');
            addToHistory(text);

            // Add AI loading message
            const aiMessageDiv = addMessage('', 'ai', true);

            // Simulate AI response after 4 seconds
            setTimeout(() => {
                const response = "Это демо-ответ Faber. Ваш запрос: \"" + text + "\". В полной версии здесь будет реальный ответ от нейросети.";
                showTypingEffect(aiMessageDiv, response);
            }, 4000);
        }

        function addMessage(text, type, isLoading = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (isLoading) {
                bubble.innerHTML = `                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
            } else {
                bubble.textContent = text;
            }
            
            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return bubble;
        }

        function showTypingEffect(element, text) {
            element.innerHTML = '';
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    setTimeout(type, 30);
                }
            }
            
            type();
        }

        function addToHistory(text) {
            let history = JSON.parse(localStorage.getItem('faber_history') || '[]');
            history.unshift(text);
            if (history.length > 20) history.pop();
            localStorage.setItem('faber_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('faber_history') || '[]');
            historyList.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.textContent = item;
                li.addEventListener('click', () => {
                    inputField.value = item;                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    inputField.focus();
                });
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
