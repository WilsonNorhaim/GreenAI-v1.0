<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Faber v1.0</title>
    <style>
        /* --- GLOBAL & RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, #000000 0%, #0a0e27 30%, #1a3a8f 60%, #6bb6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            color: #ffffff;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- HEADER --- */
        .header {
            position: fixed;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;            flex-shrink: 0;
        }

        .header-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .header-version {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        /* --- MAIN CONTENT --- */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 140px 20px 180px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .empty-state h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* --- CHAT AREA --- */
        .chat-area {
            position: absolute;
            top: 0;            left: 0;
            width: 100%;
            height: 100%;
            padding-top: 100px;
            padding-bottom: 140px;
            overflow-y: auto;
            display: none;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-area.active {
            display: block;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        /* --- MESSAGES --- */
        .message {
            display: flex;
            margin-bottom: 24px;
            padding: 0 20px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .message.user .bubble {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: rgba(20, 25, 40, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        /* --- IMAGES IN MESSAGES --- */
        .message-images {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            width: 100%;
        }

        .message-images.single {
            grid-template-columns: 1fr;
        }

        .message-images.multiple {
            grid-template-columns: repeat(2, 1fr);
        }

        .message-images.triple {
            grid-template-columns: repeat(2, 1fr);
        }

        .message-images.triple .img-item:first-child {
            grid-column: 1 / -1;
        }

        .img-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;            transition: transform 0.2s;
            background: rgba(0,0,0,0.2);
        }

        .img-item:hover {
            transform: scale(1.02);
        }

        .img-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-item .img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(107, 182, 255, 0.2), rgba(26, 58, 143, 0.3));
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        /* Image Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* --- INPUT BAR --- */
        .input-container {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 16px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);            padding: 5px;
            box-shadow: 0 0 20px rgba(107, 182, 255, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            min-width: 0;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 30px rgba(107, 182, 255, 0.3), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            border-color: rgba(107, 182, 255, 0.4);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            max-width: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-right: 4px;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            padding: 0 8px;
            outline: none;
            min-width: 0;
            -webkit-appearance: none;        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            max-width: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            margin-left: 4px;
        }

        .send-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn.active {
            background: #ffffff;
            color: #000;
            transform: rotate(-45deg);
        }

        /* --- SIDEBAR --- */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 190;
            opacity: 0;            pointer-events: none;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 200;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: max(80px, env(safe-area-inset-top)) 16px 20px;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .sidebar-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        .new-chat-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 12px;            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2sfaber.png": flex;
            align-items: center;
            gap: 6 alt="Logo" 0;
        }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .new-chat-btn:active {
            transform: scale(0.95);
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .history-item:active {
            transform: scale(0.98);
        }

        .history-text {
            flex: 1;
            font-size: 14px;            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .history-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ff4757;
        }

        .delete-btn:active {
            transform: scale(0.9);
        }

        /* --- FOOTER ----logo">
        position: fixed;
            bottom: 10px <span class=": 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            z-index: 50;
            pointer-events: none;
        }

        /* --- SPLASH --- */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s;
        }
        
        .splash img {
            width: 100px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- LOADERS --- */
        .loader-dots {
            display: flex;
            gap: 4px;
            padding: 5px 0;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-width: 480px) {
            .header {
                padding: 8px 16px;
                max-width: 90%;
            }

            .header-title {
                font-size: 16px;
            }
            .header-logo {
                width: 20px;
                height: 20px;
            }

            .input-container {
                padding: 0 12px;
                bottom: max(16px, env(safe-area-inset-bottom));
            }

            .input-wrapper {
                padding: 4px;
                border-radius: 30px;
            }

            .menu-btn,
            .send-btn {
                width: 38px;
                height: 38px;
                min-width: 38px;
                max-width: 38px;
            }

            .input-field {
                font-size: 15px;
                padding: 0 6px;
            }

            .bubble {
                max-width: 90%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .sidebar {
                width: 85%;
                max-width: 300px;
            }

            .content {
                padding: 120px 16px 160px;
            }

            .empty-state h1 {
                font-size: 20px;
            }

            .message-images.multiple,
            .message-images.triple {                grid-template-columns: 1fr;
            }
            
            .message-images.triple .img-item:first-child {
                grid-column: auto;
            }
        }

        @media (max-width: 360px) {
            .header {
                padding: 6px 12px;
            }

            .header-title {
                font-size: 14px;
            }

            .header-version {
                font-size: 10px;
                padding: 1px 4px;
            }

        }
    </style>

<body>

    <!-- Splash Screen -->
    <div class="splash" id="splash">
        <img src="faber.png" alt="Faber">
    </div>

    <!-- Header -->
    <div class="header">
        <img src=">
    </div>

    <!-- Empty State -->
    <div class="content" id="emptyState">
        <div class="empty-state">
            <h1>Чем могу помочь?</h1>
            <p>Задайте вопрос нейросети Faber</p>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <!-- Messages will appear here -->
    </div>

    <!-- Input Bar -->
    <div class="input-container">
        <div class="input-wrapper">
            <button class="menu-btn" id="menuBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <input type="text" class="input-field" id="inputField" placeholder="Спросить Faber..." autocomplete="off">
            <button class="send-btn" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">История</span>
            <button class="new-chat-btn" id="newChatBtn">                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Новый
            </button>
        </div>
        <ul class="history-list" id="historyList">
            <!-- History items -->
        </ul>
    </div>

    <!-- Image Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <img src="" alt="Full size" id="lightboxImg">
    </div>

    <!-- Footer -->
    <div class="footer">
        Wilson Corporation 2026© | Faber может ошибаться!
    </div>

    <script>
        // --- VARIABLES ---
        const splash = document.getElementById('splash');
        const emptyState = document.getElementById('emptyState');
        const chatArea = document.getElementById('chatArea');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const historyList = document.getElementById('historyList');
        const newChatBtn = document.getElementById('newChatBtn');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');

        let currentChatId = null;
        let chats = JSON.parse(localStorage.getItem('faber_chats')) || [];
        let aiData = null;

        // --- INIT ---
        window.addEventListener('load', async () => {
            // Load AI data
            try {
                const response = await fetch('data.json');
                aiData = await response.json();
                console.log('AI data loaded:', aiData);
            } catch (error) {                console.error('Error loading data.json:', error);
                // Fallback data if JSON fails to load
                aiData = {
                    keywords: {},
                    default: {
                        responses: [
                            {
                                text: "Извините, база данных не загружена. Пожалуйста, убедитесь что файл data.json существует",
                                probability: 1,
                                images: []
                            }
                        ]
                    }
                };
            }

            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 3000);
            renderHistory();
        });

        // --- SIDEBAR LOGIC ---
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        menuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --- LIGHTBOX ---
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {            if (e.key === 'Escape') closeLightbox();
        });

        // --- AI PROBABILITY SYSTEM ---
        function selectResponseByProbability(responses) {
            const random = Math.random();
            let cumulative = 0;
            
            for (const response of responses) {
                cumulative += response.probability;
                if (random <= cumulative) {
                    return response;
                }
            }
            
            // Fallback to last response
            return responses[responses.length - 1];
        }

        function findKeywordInText(text) {
            const lowerText = text.toLowerCase();
            const keywords = Object.keys(aiData.keywords);
            
            for (const keyword of keywords) {
                if (lowerText.includes(keyword)) {
                    return keyword;
                }
            }
            
            return null;
        }

        function getAIResponse(userText) {
            if (!aiData) {
                return {
                    text: "Система загружается...",
                    images: []
                };
            }

            const keyword = findKeywordInText(userText);
            
            if (keyword && aiData.keywords[keyword]) {
                const responses = aiData.keywords[keyword].responses;
                return selectResponseByProbability(responses);
            } else {
                // Default response
                const defaultResponses = aiData.default.responses;
                return selectResponseByProbability(defaultResponses);
            }        }

        // --- CHAT LOGIC ---
        function createChat() {
            const id = Date.now();
            const newChat = {
                id: id,
                title: 'Новый диалог',
                messages: []
            };
            chats.unshift(newChat);
            saveChats();
            currentChatId = id;
            renderHistory();
            clearChatUI();
            toggleSidebar();
        }

        newChatBtn.addEventListener('click', createChat);

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            if (!chat) return;

            clearChatUI();
            
            if (chat.messages.length > 0) {
                emptyState.style.display = 'none';
                chatArea.classList.add('active');
                chat.messages.forEach(msg => {
                    appendMessageToUI(msg.text, msg.role, msg.images || [], false);
                });
            } else {
                emptyState.style.display = 'flex';
                chatArea.classList.remove('active');
            }
            toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            if(confirm('Удалить этот диалог?')) {
                chats = chats.filter(c => c.id !== id);
                saveChats();
                renderHistory();
                if (currentChatId === id) {
                    createChat();
                }
            }        }

        function saveChats() {
            localStorage.setItem('faber_chats', JSON.stringify(chats));
        }

        function renderHistory() {
            historyList.innerHTML = '';
            chats.forEach(chat => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = () => loadChat(chat.id);
                
                li.innerHTML = `
                    <div class="history-text">${chat.title}</div>
                    <button class="delete-btn" onclick="deleteChat(event, ${chat.id})">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                `;
                historyList.appendChild(li);
            });
        }

        function clearChatUI() {
            chatArea.innerHTML = '';
            inputField.value = '';
            sendBtn.classList.remove('active');
        }

        function createImagesHTML(images) {
            if (!images || images.length === 0) return '';
            
            let gridClass = 'single';
            if (images.length === 2) gridClass = 'multiple';
            if (images.length >= 3) gridClass = 'triple';
            
            const imagesHTML = images.map(img => {
                const imgPath = `image/${img}`;
                return `
                    <div class="img-item" onclick="openLightbox('${imgPath}')">
                        <img src="${imgPath}" alt="AI Response Image" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>Изображение</div>'">
                    </div>
                `;
            }).join('');
            
            return `<div class="message-images ${gridClass}">${imagesHTML}</div>`;
        }

        function appendMessageToUI(text, role, images = [], animate = true) {
            const msgDiv = document.createElement('div');            msgDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (role === 'ai' && text === 'LOADING') {
                bubble.innerHTML = `
                    <div class="loader-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                `;
            } else {
                bubble.innerHTML = text;
                if (images && images.length > 0) {
                    bubble.innerHTML += createImagesHTML(images);
                }
            }

            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return bubble;
        }

        function typeText(element, text, images) {
            element.textContent = '';
            let i = 0;
            const speed = 20; 
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    chatArea.scrollTop = chatArea.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    // Add images after text is fully typed
                    if (images && images.length > 0) {
                        element.innerHTML += createImagesHTML(images);
                    }
                }
            }
            type();
        }

        function handleSend() {
            const text = inputField.value.trim();
            if (!text) return;
            emptyState.style.display = 'none';
            chatArea.classList.add('active');
            inputField.value = '';
            sendBtn.classList.remove('active');

            appendMessageToUI(text, 'user');
            
            const chatIndex = chats.findIndex(c => c.id === currentChatId);
            if (chatIndex > -1) {
                if (chats[chatIndex].messages.length === 0) {
                    chats[chatIndex].title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                    renderHistory();
                }
                chats[chatIndex].messages.push({ role: 'user', text: text, images: [] });
            }

            const loadingBubble = appendMessageToUI('LOADING', 'ai');

            // Simulate AI thinking time
            setTimeout(() => {
                loadingBubble.parentElement.remove();
                
                // Get AI response with probability
                const response = getAIResponse(text);
                
                const aiBubble = appendMessageToUI('', 'ai');
                
                // Type text with animation
                typeText(aiBubble, response.text, response.images);

                if (chatIndex > -1) {
                    chats[chatIndex].messages.push({ 
                        role: 'ai', 
                        text: response.text,
                        images: response.images || []
                    });
                    saveChats();
                }

            }, 1500 + Math.random() * 1000); // Random delay 1.5-2.5s
        }

        // --- EVENT LISTENERS ---
        sendBtn.addEventListener('click', handleSend);
        
        inputField.addEventListener('input', () => {
            if (inputField.value.trim().length > 0) {
                sendBtn.classList.add('active');
            } else {                sendBtn.classList.remove('active');
            }
        });

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

    </script>
</body>
</html>
